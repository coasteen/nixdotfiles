background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 12
    dim = 0.4
}

input-field {
    monitor =
    size = 350, 60
    position = 0, -100
    rounding = 0
    border_width = 2

    font = "JetBrainsMono Nerd Font"
    font_size = 22
    font_color = rgb(245, 224, 220)

    inner_color = rgb(30, 24, 36)
    outer_color = rgb(58, 52, 70)
    border_color = rgb(252, 205, 205)
    placeholder_text = "Password..."
    fade_on_empty = true
}

label {
    monitor =
    text = $TIME
    font = "JetBrainsMono Nerd Font"
    font_size = 64
    position = 0, 100
    color = rgb(245, 224, 220)
}

